version: "3.9"

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Main API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production
    image: lcc:${VERSION:-latest}
    container_name: lcc-api
    restart: unless-stopped
    command: [ "server", "--host", "0.0.0.0", "--port", "8000" ]
    working_dir: /workspace
    user: lcc
    environment:
      # Application
      NODE_ENV: production
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

      # LCC Configuration
      LCC_CACHE_DIR: /var/cache/lcc
      LCC_DB_PATH: /var/lib/lcc/lcc.db
      LCC_POLICY_DIR: /var/lib/lcc/policies
      LCC_TEMPLATE_DIR: /var/lib/lcc/templates
      LCC_DATABASE_URL: postgresql+asyncpg://lcc:${POSTGRES_PASSWORD}@postgres:5432/lcc
      LCC_REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      LCC_LOG_LEVEL: ${LCC_LOG_LEVEL:-INFO}
      LCC_LOG_FORMAT: json

      # Security
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}

      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}

      # Redis (optional cache)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}

      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}

    ports:
      - "${API_PORT:-8000}:8000"

    volumes:
      # Persistent data
      - lcc-data:/var/lib/lcc:rw
      - lcc-cache:/var/cache/lcc:rw

      # Logs
      - lcc-logs:/var/log/lcc:rw

      # Read-only source (for production)
      - ./src:/workspace/src:ro
      - ./scripts:/workspace/scripts:ro

    networks:
      - lcc-network

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-2.0}"
          memory: ${API_MEMORY_LIMIT:-1G}
        reservations:
          cpus: "${API_CPU_RESERVATION:-0.5}"
          memory: ${API_MEMORY_RESERVATION:-256M}

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service=lcc-api,environment=production"

  # Worker service
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production
    image: lcc:${VERSION:-latest}
    container_name: lcc-worker
    restart: unless-stopped
    entrypoint: [ "/opt/lcc/bin/arq" ]
    command: [ "lcc.worker.worker.WorkerSettings" ]
    working_dir: /workspace
    user: lcc
    environment:
      # Application
      NODE_ENV: production
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1

      # LCC Configuration
      LCC_CACHE_DIR: /var/cache/lcc
      LCC_DB_PATH: /var/lib/lcc/lcc.db
      LCC_POLICY_DIR: /var/lib/lcc/policies
      LCC_TEMPLATE_DIR: /var/lib/lcc/templates
      LCC_DATABASE_URL: postgresql+asyncpg://lcc:${POSTGRES_PASSWORD}@postgres:5432/lcc
      LCC_REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      LCC_LOG_LEVEL: ${LCC_LOG_LEVEL:-INFO}
      LCC_LOG_FORMAT: json

      # Redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}

      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}

    volumes:
      # Persistent data
      - lcc-data:/var/lib/lcc:rw
      - lcc-cache:/var/cache/lcc:rw

      # Logs
      - lcc-logs:/var/log/lcc:rw

      # Read-only source (for production)
      - ./src:/workspace/src:ro
      - ./scripts:/workspace/scripts:ro

    networks:
      - lcc-network

    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Dashboard frontend
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: lcc-dashboard:${VERSION:-latest}
    container_name: lcc-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    networks:
      - lcc-network
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${DASHBOARD_CPU_LIMIT:-1.0}"
          memory: ${DASHBOARD_MEMORY_LIMIT:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Redis cache (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: lcc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - lcc-network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL database (alternative to SQLite for production)
  postgres:
    image: postgres:15-alpine
    container_name: lcc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lcc}
      POSTGRES_USER: ${POSTGRES_USER:-lcc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lcc-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lcc}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: lcc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    networks:
      - lcc-network
    depends_on:
      - api
      - dashboard
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Prometheus monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: lcc-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - lcc-network
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # Grafana dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: lcc-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - lcc-network
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  lcc-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LCC_DATA_PATH:-./data}

  lcc-cache:
    driver: local

  lcc-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LCC_LOGS_PATH:-./logs}

  redis-data:
    driver: local

  postgres-data:
    driver: local

  nginx-cache:
    driver: local

  nginx-logs:
    driver: local

  prometheus-data:
    driver: local

  grafana-data:
    driver: local

networks:
  lcc-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET:-172.20.0.0/16}
