trigger:
  branches:
    include:
      - main

variables:
  LCC_REPORT: lcc-report.json

stages:
  - stage: Compliance
    displayName: License Compliance
    jobs:
      - job: LicenseScan
        displayName: Run LCC
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install .[test]
            displayName: Install dependencies

          - script: |
              lcc scan . \
                --format json \
                --output $(LCC_REPORT) \
                --policy permissive \
                --context saas \
                --threshold 0.7
            displayName: Run license compliance scan
            env:
              LCC_OPA_URL: $(LCC_OPA_URL)
              LCC_OPA_TOKEN: $(LCC_OPA_TOKEN)
              LCC_REDIS_URL: $(LCC_REDIS_URL)

          - publish: $(LCC_REPORT)
            artifact: license-compliance
            displayName: Publish compliance report
