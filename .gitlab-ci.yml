stages:
  - compliance

variables:
  LCC_REPORT: "lcc-report.json"

compliance:
  stage: compliance
  image: python:3.11
  script:
    - pip install --upgrade pip
    - pip install .
    - lcc scan "$CI_PROJECT_DIR" --format json --output "$LCC_REPORT" --threshold 0.5
  artifacts:
    when: always
    paths:
      - $LCC_REPORT
    reports:
      junit: $LCC_REPORT
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  after_script:
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        echo "Compliance scan completed. Report saved to $LCC_REPORT" > mr_comment.txt
        glab mr note $CI_MERGE_REQUEST_IID --body "$(cat mr_comment.txt)"
      fi
