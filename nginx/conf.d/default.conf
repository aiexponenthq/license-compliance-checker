# API Backend (port 8000)
server {
    listen 80;
    server_name api.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL configuration
    include /etc/nginx/conf.d/ssl.conf;

    # Logging
    access_log /var/log/nginx/api.access.log json_combined;
    error_log /var/log/nginx/api.error.log warn;

    # Request ID tracking for observability
    add_header X-Request-ID $request_id always;

    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # API endpoints
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Keep-alive
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering for better performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Metrics endpoint (restricted access)
    location /metrics {
        proxy_pass http://api_backend/metrics;

        # Restrict to internal networks only
        allow 172.20.0.0/16;  # Docker network
        allow 10.0.0.0/8;     # Private network
        deny all;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Dashboard Frontend (port 3000)
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL configuration
    include /etc/nginx/conf.d/ssl.conf;

    # Logging
    access_log /var/log/nginx/dashboard.access.log json_combined;
    error_log /var/log/nginx/dashboard.error.log warn;

    # Request ID tracking
    add_header X-Request-ID $request_id always;

    # Rate limiting (more lenient for dashboard)
    limit_req zone=dashboard_limit burst=50 nodelay;
    limit_req_status 429;

    # Next.js frontend
    location / {
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # WebSocket support for Next.js HMR (development only)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://dashboard_backend;

        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js specific paths
    location /_next/ {
        proxy_pass http://dashboard_backend;

        # Cache Next.js build artifacts
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Headers
        proxy_set_header Host $host;
    }
}

# Monitoring Stack (optional, profile: monitoring)
server {
    listen 80;
    server_name monitoring.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name monitoring.yourdomain.com;

    # SSL configuration
    include /etc/nginx/conf.d/ssl.conf;

    # Basic auth for monitoring
    auth_basic "Monitoring Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Grafana
    location / {
        proxy_pass http://grafana:3001;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prometheus
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Default server (catch-all)
server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;

    # SSL configuration for default server
    include /etc/nginx/conf.d/ssl.conf;

    # Return 444 (close connection without response)
    return 444;
}
