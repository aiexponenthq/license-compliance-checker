# Prometheus Configuration for License Compliance Checker

global:
  scrape_interval: 15s     # How often to scrape targets
  scrape_timeout: 10s      # Timeout for scraping
  evaluation_interval: 15s # How often to evaluate rules

  # Attach labels to all time series collected
  external_labels:
    cluster: 'lcc-production'
    monitor: 'lcc-monitor'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # License Compliance Checker API
  - job_name: 'lcc-api'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'lcc-api'
          environment: 'production'
    # HTTP settings
    scheme: http
    # Optional: basic auth
    # basic_auth:
    #   username: prometheus
    #   password: secret

  # PostgreSQL metrics (using postgres_exporter)
  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          database: 'lcc'
    # Optional: only scrape if postgres_exporter is deployed

  # Redis metrics (using redis_exporter)
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          cache: 'lcc'
    # Optional: only scrape if redis_exporter is deployed

  # Nginx metrics (using nginx-prometheus-exporter)
  - job_name: 'nginx'
    scrape_interval: 15s
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'nginx'
          role: 'reverse-proxy'
    # Optional: only scrape if nginx_exporter is deployed

  # Node/Host metrics (using node_exporter)
  - job_name: 'node'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node'
          role: 'host-metrics'
    # Optional: only scrape if node_exporter is deployed

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          role: 'container-metrics'
    # Optional: only scrape if cAdvisor is deployed

# Remote write configuration (for long-term storage)
# remote_write:
#   - url: "https://prometheus-remote-write-endpoint/api/v1/write"
#     basic_auth:
#       username: <username>
#       password: <password>

# Remote read configuration (for querying long-term storage)
# remote_read:
#   - url: "https://prometheus-remote-read-endpoint/api/v1/read"
#     basic_auth:
#       username: <username>
#       password: <password>

# Storage configuration
storage:
  tsdb:
    retention:
      time: 30d    # Keep data for 30 days
      size: 10GB   # Maximum storage size
