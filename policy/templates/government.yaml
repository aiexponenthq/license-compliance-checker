name: government
version: "1.0"
description: Government procurement policy with emphasis on permissive licenses and supply-chain visibility.
disclaimer: Compliance artefacts generated by LCC support due diligence but do not replace mandated legal reviews.
default_context: procurement
contexts:
  procurement:
    description: Software included in government procurement bids or tenders.
    allow:
      - MIT
      - Apache-2.0
      - BSD-*
      - CC0-1.0
      - EPL-2.0
    deny:
      - SSPL-1.0
      - AGPL-3.0
    review:
      - GPL-2.0
      - GPL-3.0
      - LGPL-*
      - MPL-*
    deny_reasons:
      SSPL-1.0: "Fails government open-source definition and service restrictions."
      AGPL-3.0: "Network copyleft clauses complicate compliance for public sector hosting."
    review_reasons:
      GPL-2.0: "Confirm downstream redistribution workflow and security posture."
      GPL-3.0: "Assess patent and anti-tivoization provisions with legal counsel."
      LGPL-*: "Verify dynamic linking strategy meets policy guidelines."
      MPL-*: "Ensure change tracking covers file-level scope."
    dual_license_preference: avoid_copyleft
    explanation:
      - Requires supply-chain security evidence for all approvals.
      - Non-permissive licenses trigger documentation review before award.
  internal-assessment:
    description: Internal prototyping before procurement submission.
    allow:
      - MIT
      - Apache-2.0
      - BSD-*
      - CC0-1.0
    review:
      - GPL-*
      - AGPL-*
      - SSPL-1.0
    deny_reasons:
      SSPL-1.0: "Not acceptable for distribution beyond internal prototyping unless exempted."
    dual_license_preference: most_permissive
