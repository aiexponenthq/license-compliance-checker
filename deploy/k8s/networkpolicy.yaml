apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lcc-network-policy
spec:
  podSelector:
    matchLabels:
      app: lcc
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: lcc
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
