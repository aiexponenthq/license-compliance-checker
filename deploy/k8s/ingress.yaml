apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lcc-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: lcc.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lcc-service
                port:
                  number: 80
