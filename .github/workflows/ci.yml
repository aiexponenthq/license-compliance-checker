name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/lcc/ --ignore-missing-imports
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,test]"
        env:
          LCC_SECRET_KEY: "ci-test-key-not-for-production"

      - name: Run tests
        run: pytest --cov=lcc --cov-report=xml -q --ignore=tests/performance
        env:
          LCC_SECRET_KEY: "ci-test-key-not-for-production"
          LCC_LLM_PROVIDER: "disabled"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[all]"
          pip install pip-audit

      # PYSEC-2026-1325 (ecdsa): a Minerva-style timing side channel with no
      # fixed release. It is pulled transitively by python-jose and is not
      # exploitable in this offline signing/verification path, so it is waived.
      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --vulnerability-service osv --ignore-vuln PYSEC-2026-1325
