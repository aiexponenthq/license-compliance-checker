version: 2.1
description: CircleCI orb for running License Compliance Checker scans.

commands:
  run-scan:
    description: Install dependencies and run the License Compliance Checker.
    parameters:
      path:
        type: string
        default: "."
      policy:
        type: string
        default: "permissive"
      context:
        type: string
        default: "saas"
      threshold:
        type: string
        default: "0.7"
    steps:
      - run:
          name: Install License Compliance Checker
          command: |
            python -m pip install --upgrade pip
            pip install .[test]
      - run:
          name: Run License Compliance Checker
          environment:
            LCC_OPA_URL: << pipeline.parameters.lcc-opa-url >>
            LCC_OPA_TOKEN: << pipeline.parameters.lcc-opa-token >>
            LCC_REDIS_URL: << pipeline.parameters.lcc-redis-url >>
          command: |
            lcc scan <<parameters.path>> \
              --format json \
              --output lcc-report.json \
              --policy <<parameters.policy>> \
              --context <<parameters.context>> \
              --threshold <<parameters.threshold>>
  store-report:
    description: Store the generated compliance report artifact.
    steps:
      - store_artifacts:
          path: lcc-report.json
          destination: license-compliance

jobs:
  scan:
    description: Run License Compliance Checker and store the resulting artifact.
    parameters:
      python-version:
        type: string
        default: "3.11"
      path:
        type: string
        default: "."
      policy:
        type: string
        default: "permissive"
      context:
        type: string
        default: "saas"
      threshold:
        type: string
        default: "0.7"
    docker:
      - image: cimg/python:<<parameters.python-version>>
    steps:
      - checkout
      - run-scan:
          path: <<parameters.path>>
          policy: <<parameters.policy>>
          context: <<parameters.context>>
          threshold: <<parameters.threshold>>
      - store-report

parameters:
  lcc-opa-url:
    type: string
    default: ""
  lcc-opa-token:
    type: string
    default: ""
  lcc-redis-url:
    type: string
    default: ""
